<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百本</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@700&family=Space+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;}
.hide{display:none!important;}
/* LOGIN */
#s-login{min-height:100vh;background:#0c0804;color:#f0ebe0;display:flex;align-items:center;justify-content:center;}
.lb{width:300px;}
.lb h1{font-family:'Shippori Mincho',serif;font-size:32px;letter-spacing:.15em;margin-bottom:6px;}
.lb p{font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);margin-bottom:28px;}
.lb label{font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);display:block;margin-bottom:4px;margin-top:12px;}
.lb input{width:100%;background:rgba(240,235,224,.06);border:1px solid rgba(240,235,224,.1);color:#f0ebe0;padding:9px 10px;font-size:13px;outline:none;font-family:'Noto Serif JP',serif;}
#lerr{color:#c0392b;font-family:'Space Mono',monospace;font-size:9px;margin-top:8px;display:none;}
.lb .btns{display:flex;gap:10px;margin-top:16px;}
/* READER */
#s-reader{min-height:100vh;background:#faf9f7;color:#1a1814;}
.rh{max-width:720px;margin:0 auto;padding:28px 24px 20px;border-bottom:1px solid rgba(26,24,20,.1);}
.rh-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.rh-title{font-family:'Shippori Mincho',serif;font-size:36px;font-weight:700;letter-spacing:.15em;}
.rh-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(26,24,20,.45);margin-top:6px;}
.rh-right{text-align:right;font-family:'Space Mono',monospace;}
.rh-date{font-size:18px;font-weight:700;}
.rh-vtot{font-size:10px;color:rgba(26,24,20,.45);margin-top:3px;}
.rh-lbtn{margin-top:8px;font-size:9px;padding:3px 8px;border:1px solid rgba(26,24,20,.22);background:transparent;color:rgba(26,24,20,.45);cursor:pointer;font-family:'Space Mono',monospace;}
.rh-theme{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid rgba(26,24,20,.1);font-size:13px;}
.rh-theme-lb{font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.45);letter-spacing:.1em;text-transform:uppercase;}
.rpicks{max-width:720px;margin:0 auto;padding:20px 24px;border-bottom:1px solid rgba(26,24,20,.1);}
.rpicks-lb{font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.rpick{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(26,24,20,.07);}
.rpick:last-child{border-bottom:none;}
.rpick-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;}
.rpick-ed{font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.45);margin-bottom:3px;}
.rpick-t{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:4px;}
.rpick-c{font-size:12px;line-height:1.8;color:rgba(26,24,20,.45);font-style:italic;}
.rfilters{max-width:720px;margin:0 auto;padding:12px 24px;display:flex;gap:6px;align-items:center;border-bottom:1px solid rgba(26,24,20,.1);flex-wrap:wrap;}
.rfbtn{font-family:'Space Mono',monospace;font-size:10px;padding:5px 12px;border:1px solid rgba(26,24,20,.1);background:transparent;color:rgba(26,24,20,.45);cursor:pointer;}
.rfbtn.on{border-color:#1a1814;background:#1a1814;color:white;}
.rfcnt{font-family:'Space Mono',monospace;font-size:10px;color:rgba(26,24,20,.2);margin-left:auto;}
.rlist{max-width:720px;margin:0 auto;padding:0 24px 60px;}
.rstory{padding:18px 0;border-bottom:1px solid rgba(26,24,20,.08);border-left:3px solid transparent;}
.rstory.ap{border-left-color:#9a7a1e;padding-left:12px;}
.rstory.gp{border-left-color:#1e4a8a;padding-left:12px;}
.rstory-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rstory-num{font-family:'Space Mono',monospace;font-size:10px;color:rgba(26,24,20,.2);min-width:22px;}
.rtag{font-family:'Space Mono',monospace;font-size:8px;padding:2px 6px;color:white;}
.rstory-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:6px;}
.rstory-intro{font-size:13px;line-height:1.85;color:rgba(26,24,20,.45);cursor:pointer;margin-bottom:10px;}
.rstory-foot{display:flex;align-items:center;}
.rgenre{font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.2);}
.rvbtn{font-family:'Space Mono',monospace;font-size:10px;padding:4px 11px;border:1px solid rgba(26,24,20,.22);background:transparent;color:rgba(26,24,20,.45);cursor:pointer;margin-left:auto;}
.rvbtn.voted{border-color:#a02820;background:#a02820;color:white;cursor:default;}
.rempty{text-align:center;padding:80px 24px;max-width:720px;margin:0 auto;}
.rempty h2{font-family:'Shippori Mincho',serif;font-size:18px;color:rgba(26,24,20,.45);margin-bottom:8px;}
.rempty p{font-family:'Space Mono',monospace;font-size:10px;color:rgba(26,24,20,.2);}
.rh-date{font-size:18px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.rh-date:hover{opacity:.7;}
/* REVIEW */
.r-review{max-width:720px;margin:0 auto;padding:28px 24px 48px;}
.r-review-lb{font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;}
.r-review-body{font-size:14px;line-height:2.1;color:rgba(26,24,20,.75);}
.r-review-body p{margin-bottom:1.3em;}
/* CALENDAR MODAL */
#cal-modal{display:none;position:fixed;inset:0;z-index:300;}
.cal-bg{position:absolute;inset:0;background:rgba(12,8,4,.7);}
.cal-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#faf9f7;padding:28px;width:90%;max-width:400px;border:1px solid rgba(26,24,20,.1);}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cal-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;}
.cal-nav{font-family:'Space Mono',monospace;font-size:12px;background:none;border:1px solid rgba(26,24,20,.15);padding:4px 10px;cursor:pointer;color:rgba(26,24,20,.6);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-family:'Space Mono',monospace;font-size:8px;color:rgba(26,24,20,.3);text-align:center;padding:4px 0;}
.cal-day{font-family:'Space Mono',monospace;font-size:11px;text-align:center;padding:7px 2px;cursor:pointer;border:1px solid transparent;color:rgba(26,24,20,.3);}
.cal-day.has{color:#1a1814;border-color:rgba(26,24,20,.1);background:white;}
.cal-day.has:hover{background:#1a1814;color:white;border-color:#1a1814;}
.cal-day.today{border-color:#9a7a1e;color:#9a7a1e;}
.cal-day.sel{background:#1a1814;color:white;border-color:#1a1814;}
.cal-x{font-family:'Space Mono',monospace;font-size:11px;background:none;border:none;cursor:pointer;color:rgba(26,24,20,.45);}
/* CONFIRM MODAL */
#conf-modal{display:none;position:fixed;inset:0;z-index:400;}
.conf-bg{position:absolute;inset:0;background:rgba(5,3,2,.8);}
.conf-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0c0804;border:1px solid rgba(240,235,224,.15);padding:32px;width:90%;max-width:380px;}
.conf-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;color:#f0ebe0;margin-bottom:10px;}
.conf-body{font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,235,224,.45);line-height:1.9;margin-bottom:22px;}
.conf-btns{display:flex;gap:10px;justify-content:flex-end;}
/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:200;}
.modal-bg{position:absolute;inset:0;background:rgba(250,249,247,.94);}
.modal-inner{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:90%;max-width:560px;background:white;padding:36px;border:1px solid rgba(26,24,20,.1);max-height:calc(100vh - 80px);overflow-y:auto;}
.modal-x{position:absolute;top:16px;right:16px;background:none;border:none;font-size:14px;color:rgba(26,24,20,.45);cursor:pointer;font-family:'Space Mono',monospace;}
.modal-meta{display:flex;gap:8px;font-family:'Space Mono',monospace;font-size:9px;color:rgba(26,24,20,.45);margin-bottom:10px;flex-wrap:wrap;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;line-height:1.4;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(26,24,20,.1);}
.modal-body{font-size:13.5px;line-height:2.1;color:rgba(26,24,20,.85);margin-bottom:20px;}
.modal-body p{margin-bottom:1.3em;}
.modal-cn{padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.8;font-style:italic;}
.modal-cn-lb{font-family:'Space Mono',monospace;font-size:8px;color:rgba(26,24,20,.45);margin-bottom:4px;font-style:normal;letter-spacing:.1em;}
.modal-foot{display:flex;align-items:center;gap:10px;padding-top:16px;border-top:1px solid rgba(26,24,20,.1);}
.modal-nav{display:flex;gap:8px;margin-left:auto;}
.modal-nav button{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid rgba(26,24,20,.1);background:transparent;cursor:pointer;}
/* ADMIN */
#s-admin{min-height:100vh;background:#0c0804;color:#f0ebe0;display:flex;flex-direction:column;}
.ah{display:flex;align-items:center;gap:12px;padding:13px 24px;border-bottom:1px solid rgba(240,235,224,.08);background:#080503;flex-shrink:0;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.ah-logo{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;letter-spacing:.15em;}
.ah-badge{font-family:'Space Mono',monospace;font-size:8px;background:#c0392b;padding:2px 6px;color:white;font-weight:700;}
.ah-user{font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);}
.ah-nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;}
.ah-nbtn{font-family:'Space Mono',monospace;font-size:10px;padding:6px 13px;background:transparent;color:rgba(240,235,224,.45);border:1px solid rgba(240,235,224,.08);cursor:pointer;}
.ah-nbtn.on{background:rgba(240,235,224,.1);color:#f0ebe0;border-color:rgba(240,235,224,.18);}
.ah-rbtn{font-family:'Space Mono',monospace;font-size:10px;padding:6px 13px;background:rgba(240,235,224,.08);color:rgba(240,235,224,.6);border:1px solid rgba(240,235,224,.08);cursor:pointer;margin-right:6px;}
.ah-out{font-family:'Space Mono',monospace;font-size:10px;padding:6px 13px;background:transparent;color:rgba(240,235,224,.45);border:1px solid rgba(240,235,224,.08);cursor:pointer;margin-left:4px;}
.atab{display:none;}
.atab.on{display:flex;flex:1;overflow:hidden;}
.atab-block{display:none;padding:24px 28px;overflow-y:auto;flex:1;max-width:720px;}
.atab-block.on{display:block;}
/* PICKS TAB */
.pl-layout{display:flex;flex:1;height:calc(100vh - 57px);overflow:hidden;}
.pl-left{width:50%;border-right:1px solid rgba(240,235,224,.08);display:flex;flex-direction:column;overflow:hidden;}
.pl-lh{padding:12px 18px;border-bottom:1px solid rgba(240,235,224,.08);background:#0a0704;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pl-sr{flex:1;position:relative;}
.pl-sr input{width:100%;background:rgba(240,235,224,.05);border:1px solid rgba(240,235,224,.08);color:#f0ebe0;padding:6px 9px 6px 26px;font-family:'Space Mono',monospace;font-size:11px;outline:none;}
.pl-sri{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.3;}
.pl-chips{display:flex;gap:3px;}
.pchip{font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border:1px solid rgba(240,235,224,.08);background:transparent;color:rgba(240,235,224,.45);cursor:pointer;}
.pchip.on{background:rgba(240,235,224,.08);color:#f0ebe0;border-color:rgba(240,235,224,.18);}
.pl-list{overflow-y:auto;flex:1;}
.prow{display:flex;align-items:center;padding:11px 18px;gap:10px;border-bottom:1px solid rgba(240,235,224,.05);cursor:pointer;border-left:3px solid transparent;}
.prow:hover{background:rgba(240,235,224,.03);}
.prow.sel{background:rgba(240,235,224,.06);}
.prow.ap{border-left-color:#b8952a;}
.prow.gp{border-left-color:#2563a8;}
.prow-n{font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,235,224,.2);min-width:22px;}
.prow-title{font-family:'Shippori Mincho',serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.prow-meta{font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);display:flex;gap:8px;}
.prow-btns{display:flex;gap:3px;flex-shrink:0;}
.pkbtn{font-family:'Space Mono',monospace;font-size:8px;padding:2px 5px;border:1px solid;background:transparent;cursor:pointer;}
.pl-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pl-eds{border-bottom:1px solid rgba(240,235,224,.08);background:#0a0704;flex-shrink:0;display:flex;}
.ped{flex:1;padding:13px 16px;border-right:1px solid rgba(240,235,224,.08);}
.ped:last-child{border-right:none;}
.ped-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ped-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-weight:700;}
.ped-name{font-family:'Shippori Mincho',serif;font-size:13px;font-weight:700;}
.ped-role{font-family:'Space Mono',monospace;font-size:8px;color:rgba(240,235,224,.45);margin-top:1px;}
.ped-cnt{font-family:'Space Mono',monospace;font-size:9px;margin-top:6px;}
.pl-det{flex:1;overflow-y:auto;}
.det-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,235,224,.2);}
.det-en{font-family:'Shippori Mincho',serif;font-size:44px;opacity:.07;}
.det-body{padding:22px;}
.det-meta{display:flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);margin-bottom:9px;}
.det-title{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:700;line-height:1.4;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(240,235,224,.08);}
.det-text{font-size:12.5px;line-height:2.1;color:rgba(240,235,224,.8);margin-bottom:20px;}
.det-text p{margin-bottom:1.2em;}
.det-pk-lb{font-family:'Space Mono',monospace;font-size:8px;color:rgba(240,235,224,.2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.pk-card{background:rgba(240,235,224,.025);border:1px solid rgba(240,235,224,.08);padding:12px 14px;margin-bottom:8px;}
.pk-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pk-cmt{width:100%;background:rgba(240,235,224,.04);border:1px solid rgba(240,235,224,.08);color:#f0ebe0;padding:7px 10px;font-family:'Noto Serif JP',serif;font-size:12px;line-height:1.7;min-height:48px;margin-bottom:7px;outline:none;resize:vertical;}
.pk-tog{font-family:'Space Mono',monospace;font-size:9px;padding:6px 12px;border:1px solid;background:transparent;cursor:pointer;}
/* PANEL */
.acard{background:rgba(240,235,224,.025);border:1px solid rgba(240,235,224,.08);padding:18px;margin-bottom:16px;}
.acard-lb{font-family:'Space Mono',monospace;font-size:9px;color:#b8952a;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
.aflb{font-family:'Space Mono',monospace;font-size:8px;color:rgba(240,235,224,.45);text-transform:uppercase;display:block;margin-bottom:4px;margin-top:11px;}
.ainput{width:100%;background:rgba(240,235,224,.05);border:1px solid rgba(240,235,224,.08);color:#f0ebe0;padding:7px 9px;font-size:12px;font-family:'Noto Serif JP',serif;outline:none;}
.ata{width:100%;background:rgba(240,235,224,.05);border:1px solid rgba(240,235,224,.08);color:#f0ebe0;padding:7px 9px;font-family:'Noto Serif JP',serif;font-size:12px;line-height:1.7;outline:none;resize:vertical;}
.aerr{font-family:'Space Mono',monospace;font-size:9px;color:#c0392b;display:none;}
.awarn{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);padding:12px 16px;margin-bottom:12px;font-family:'Space Mono',monospace;font-size:9px;color:#c0392b;line-height:1.8;display:none;}
.astat{font-family:'Space Mono',monospace;font-size:10px;color:rgba(240,235,224,.45);line-height:2;}
.astat b{color:#f0ebe0;}
.astrip{background:rgba(5,3,2,.97);border-top:1px solid rgba(240,235,224,.08);padding:7px 24px;display:flex;align-items:center;gap:16px;font-family:'Space Mono',monospace;font-size:9px;color:rgba(240,235,224,.45);flex-shrink:0;flex-wrap:wrap;}
.astrip-dot{width:5px;height:5px;border-radius:50%;background:#1a7a4a;animation:bl 2s ease-in-out infinite;}
.agitem{background:rgba(37,99,168,.08);border:1px solid rgba(37,99,168,.2);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.arcard{background:rgba(240,235,224,.025);border:1px solid rgba(240,235,224,.08);padding:16px;cursor:pointer;margin-bottom:8px;}
.arcard:hover{background:rgba(240,235,224,.05);}
/* BUTTONS */
.bgold{background:#b8952a;color:#080503;font-weight:700;border:none;padding:8px 16px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;}
.bblue{background:#2563a8;color:white;border:none;padding:8px 16px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;}
.bgreen{background:#1a7a4a;color:white;border:none;padding:8px 16px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;}
.bghost{background:transparent;color:rgba(240,235,224,.45);border:1px solid rgba(240,235,224,.18);padding:8px 16px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;}
.bwhite{background:transparent;color:rgba(26,24,20,.45);border:1px solid rgba(26,24,20,.22);padding:8px 16px;font-size:10px;font-family:'Space Mono',monospace;cursor:pointer;}
.toast{position:fixed;bottom:48px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a7a4a;color:white;font-family:'Space Mono',monospace;font-size:10px;padding:8px 20px;opacity:0;transition:all .2s;z-index:300;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
@media(max-width:600px){.pl-layout{flex-direction:column;height:auto;}.pl-left{width:100%;height:50vh;}.pl-right{height:50vh;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login">
  <div class="lb">
    <h1>百本</h1>
    <p>EDITOR LOGIN</p>
    <label>名前</label>
    <input id="li" placeholder="crambomb" />
    <label>パスワード</label>
    <input id="lp" type="password" onkeydown="if(event.key==='Enter')login()" />
    <div id="lerr"></div>
    <div class="btns" style="display:flex;gap:10px;margin-top:16px;">
      <button class="bgold" onclick="login()">ログイン</button>
      <button class="bghost" onclick="go('reader')">読者画面へ</button>
    </div>
  </div>
</div>

<!-- READER -->
<div id="s-reader" class="hide">
  <div class="rh">
    <div class="rh-top">
      <div>
        <div class="rh-title">百本</div>
        <div class="rh-sub">AIが書いた100本の短編を、人間が選ぶ</div>
      </div>
      <div class="rh-right">
        <div class="rh-date" id="r-date" onclick="openCal()">—</div>
        <div class="rh-vtot" id="r-vtot">0 票</div>
        <button class="rh-lbtn" onclick="go('login')">編集者ログイン</button>
      </div>
    </div>
    <div id="r-theme" class="rh-theme hide">
      <span class="rh-theme-lb">今日のテーマ</span>
      <span id="r-theme-txt"></span>
    </div>
  </div>
  <div id="r-picks" class="rpicks hide">
    <div class="rpicks-lb">編集長・ゲストピック</div>
    <div id="r-picks-in"></div>
  </div>
  <div class="rfilters">
    <button class="rfbtn on" onclick="setRF('all',this)">すべて</button>
    <button class="rfbtn" onclick="setRF('admin',this)">編集長ピック</button>
    <button class="rfbtn hide" id="r-gfbtn" onclick="setRF('guest',this)">ゲストピック</button>
    <button class="rfbtn" onclick="setRF('top',this)">投票順</button>
    <span class="rfcnt" id="r-cnt">0本</span>
  </div>
  <div class="rlist" id="r-list">

<script>
var SB = 'https://xfasdpsfjxgyvucyhvwh.supabase.co';
var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmYXNkcHNmanhneXZ1Y3lodndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjIxOTQsImV4cCI6MjA4OTU5ODE5NH0.TdkfPhecVofSEBydR2HqTpmnrRxIkgXfiIhSovLDnfs';
var H = {apikey:SK,Authorization:'Bearer '+SK,'Content-Type':'application/json',Prefer:'return=representation'};

var D = {stories:[], picks:[], daily:null, votes:{}, guests:[], myVotes:[], sess:null};
var UI = {rf:'all', pf:'all', selId:null, modId:null, revT:null};
var expO = {date:true,theme:true,editors:true,picked:true,comments:true,unpicked:false,review:true};
var today = (function(){var n=new Date();return n.getFullYear()+'-'+('0'+(n.getMonth()+1)).slice(-2)+'-'+('0'+n.getDate()).slice(-2);})();
var CAL = {year:0, month:0, dates:[], adminMode:false};
var adminTargetDate = today;

function api(method, table, params, body) {
  var url = SB+'/rest/v1/'+table+(params||'');
  var opts = {method:method, headers:H};
  if(body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.status===204 ? null : r.json();
  });
}
function get(t,p){return api('GET',t,p);}
function post(t,d){return api('POST',t,'',d);}
function patch(t,p,d){return api('PATCH',t,p,d);}
function del(t,p){return api('DELETE',t,p);}
function upsert(t,d){
  var h2 = Object.assign({},H,{Prefer:'resolution=merge-duplicates,return=representation'});
  return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:h2,body:JSON.stringify(d)}).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.json();
  });
}

function go(screen) {
  ['login','reader','admin'].forEach(function(s){
    var el = document.getElementById('s-'+s);
    if(s===screen) el.classList.remove('hide');
    else el.classList.add('hide');
  });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');}, 2400);
}

// --- LOGIN ---
function login() {
  var id = document.getElementById('li').value.trim();
  var pw = document.getElementById('lp').value;
  var err = document.getElementById('lerr');
  err.style.display = 'none';
  if(!id||!pw){err.textContent='入力してください';err.style.display='block';return;}
  get('users','?is_active=eq.true').then(function(users){
    var u = null;
    for(var i=0;i<users.length;i++){
      if((users[i].display_name===id||users[i].email===id) && users[i].password_hash===pw){
        u = users[i]; break;
      }
    }
    if(u){
      D.sess = {id:u.id, name:u.display_name, role:u.role};
      setupAdmin();
    } else {
      err.textContent = '名前またはパスワードが違います';
      err.style.display = 'block';
    }
  }).catch(function(e){err.textContent='エラー: '+e.message;err.style.display='block';});
}

function logout() { D.sess=null; go('reader'); }

// --- ADMIN SETUP ---
function setupAdmin() {
  document.getElementById('a-uname').textContent = D.sess.name;
  var nav = document.getElementById('a-nav');
  var isA = D.sess.role==='admin';
  var tabs = [['picks','ピック選定']];
  if(isA) tabs = tabs.concat([['import','インポート'],['publish','公開管理'],['review','エクスポート'],['guest','ゲスト管理']]);
  nav.innerHTML = '';
  tabs.forEach(function(t, i){
    var b = document.createElement('button');
    b.className = 'ah-nbtn' + (i===0?' on':'');
    b.textContent = t[1];
    b.setAttribute('data-tab', t[0]);
    b.onclick = function(){showTab(t[0], b);};
    nav.appendChild(b);
  });
  go('admin');
  showTab('picks');
  loadAdmin();
  setupExpOpts();
  var d = document.getElementById('i-date');
  if(d) d.value = today;
  // エクスポート日付初期化
  var ef = document.getElementById('exp-from'), et = document.getElementById('exp-to');
  if(ef) ef.value = today;
  if(et) et.value = today;
}

function showTab(name, btn) {
  document.querySelectorAll('.atab,.atab-block').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.ah-nbtn').forEach(function(b){b.classList.remove('on');});
  var el = document.getElementById('tab-'+name);
  if(el) el.classList.add('on');
  if(btn) btn.classList.add('on');
  else {
    document.querySelectorAll('.ah-nbtn').forEach(function(b){
      if(b.getAttribute('data-tab')===name) b.classList.add('on');
    });
  }
  if(name==='publish') loadArc();
  if(name==='guest') loadGuests();
}

// --- LOAD ---
function loadAdmin() {
  var targetDate = adminTargetDate;
  var el = document.getElementById('a-curdate');
  if(el) el.textContent = targetDate===today ? '今日' : targetDate;
  return get('daily_meta','?date=eq.'+targetDate).then(function(ds){
    D.daily = ds[0]||null;
    return get('users','?role=eq.guest&is_active=eq.true');
  }).then(function(gs){
    D.guests = gs;
    updGuestSel();
    if(!D.daily){D.stories=[];D.picks=[];D.votes={};rPL();rPE();updStrip();updIStat();updPStat();updPlRv();return;}
    return Promise.all([
      get('stories','?daily_id=eq.'+D.daily.id+'&order=order_index.asc'),
      get('picks','?daily_id=eq.'+D.daily.id),
      get('votes','?daily_id=eq.'+D.daily.id+'&select=story_id')
    ]).then(function(r){
      D.stories=r[0]; D.picks=r[1]; D.votes={};
      r[2].forEach(function(v){D.votes[v.story_id]=(D.votes[v.story_id]||0)+1;});
      rPL(); rPE(); updStrip(); updIStat(); updPStat(); updPlRv();
    });
  }).catch(function(e){toast('読込エラー: '+e.message);});
}

function updGuestSel(){
  var sel = document.getElementById('guest-sel'); if(!sel) return;
  var cur = sel.value;
  sel.innerHTML = '<option value="">── ゲストを選択 ──</option>';
  D.guests.forEach(function(u){
    var o = document.createElement('option');
    o.value = u.id; o.textContent = u.display_name;
    if(u.id===cur) o.selected=true;
    sel.appendChild(o);
  });
  var bar = document.getElementById('guest-proxy-bar');
  if(bar) bar.style.display = D.guests.length ? 'flex' : 'none';
}

function updPlRv(){
  var el = document.getElementById('pl-rv'); if(!el) return;
  el.value = (D.daily && D.daily.editorial_comment) ? D.daily.editorial_comment : '';
}

function loadReader() {
  get('daily_meta','?status=eq.published&order=date.desc&limit=1').then(function(ds){
    if(!ds||!ds.length) return;
    D.daily = ds[0];
    return Promise.all([
      get('stories','?daily_id=eq.'+D.daily.id+'&order=order_index.asc'),
      get('picks','?daily_id=eq.'+D.daily.id),
      get('votes','?daily_id=eq.'+D.daily.id+'&select=story_id'),
      get('users','?role=eq.guest&is_active=eq.true')
    ]).then(function(r){
      D.stories=r[0]; D.picks=r[1]; D.guests=r[3]; D.votes={};
      r[2].forEach(function(v){D.votes[v.story_id]=(D.votes[v.story_id]||0)+1;});
      try{D.myVotes=JSON.parse(localStorage.getItem('hv')||'[]');}catch(e){}
      rReader();
    });
  }).catch(function(){});
}

// --- RENDER READER ---
function rReader() {
  if(!D.daily) return;
  document.getElementById('r-date').textContent = D.daily.date.replace(/-/g,'.');
  var tv = Object.values(D.votes).reduce(function(a,b){return a+b;},0);
  document.getElementById('r-vtot').textContent = tv.toLocaleString()+' 票';
  if(D.daily.theme){
    document.getElementById('r-theme').classList.remove('hide');
    document.getElementById('r-theme-txt').textContent = D.daily.theme;
  }
  var ap = D.picks.filter(function(p){return p.picker_role==='admin';});
  var gp = D.picks.filter(function(p){return p.picker_role==='guest';});
  var allP = ap.concat(gp);
  if(allP.length){
    document.getElementById('r-picks').classList.remove('hide');
    document.getElementById('r-picks-in').innerHTML = allP.map(function(p){
      var s = D.stories.filter(function(x){return x.id===p.story_id;})[0];
      if(!s) return '';
      var ia = p.picker_role==='admin', col = ia?'#9a7a1e':'#1e4a8a';
      var gname = ia ? 'crambomb' : (D.guests.filter(function(u){return u.id===p.picker_user_id;})[0]||{display_name:'ゲスト'}).display_name;
      var av = gname.charAt(0).toUpperCase();
      return '<div class="rpick">'
        +'<div class="rpick-av" style="background:'+col+';color:'+(ia?'#080503':'white')+'">'+av+'</div>'
        +'<div style="flex:1">'
        +'<div class="rpick-ed">'+gname+' / '+(ia?'EDITOR IN CHIEF':'GUEST EDITOR')+'</div>'
        +'<div class="rpick-t" onclick="openMod(\''+s.id+'\')">'+(ia?'★ ':'◆ ')+s.title+'</div>'
        +(p.comment?'<div class="rpick-c">「'+p.comment+'」</div>':'')
        +'</div></div>';
    }).join('');
  }
  if(gp.length) document.getElementById('r-gfbtn').classList.remove('hide');
  // 総評
  var rv = document.getElementById('r-review'), rb = document.getElementById('r-review-body');
  if(rv && rb && D.daily.editorial_comment){
    rb.innerHTML = D.daily.editorial_comment.split('\n').filter(Boolean).map(function(p){return'<p>'+p+'</p>';}).join('');
    rv.classList.remove('hide');
  } else if(rv) {
    rv.classList.add('hide');
  }
  rRL();
}

function rRL(){
  var list = D.stories.slice();
  if(UI.rf==='admin') list = list.filter(function(s){return D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='admin';});});
  else if(UI.rf==='guest') list = list.filter(function(s){return D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='guest';});});
  else if(UI.rf==='top') list = list.slice().sort(function(a,b){return(D.votes[b.id]||0)-(D.votes[a.id]||0);});
  document.getElementById('r-cnt').textContent = list.length+'本';
  if(!list.length){
    document.getElementById('r-list').innerHTML = '<div class="rempty"><h2>今日の百本はまだ準備中です</h2><p>しばらくお待ちください</p></div>';
    return;
  }
  document.getElementById('r-list').innerHTML = list.map(function(s){
    var ap = D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='admin';});
    var gp = D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='guest';});
    var voted = D.myVotes.indexOf(s.id)>=0, v = D.votes[s.id]||0;
    return '<div class="rstory'+(ap?' ap':gp?' gp':'')+'">'
      +'<div class="rstory-top"><span class="rstory-num">'+('0'+(s.order_index+1)).slice(-2)+'</span>'
      +(ap?'<span class="rtag" style="background:#9a7a1e">★ 編集長</span>':'')
      +(gp?'<span class="rtag" style="background:#1e4a8a">◆ ゲスト</span>':'')+'</div>'
      +'<div class="rstory-title" onclick="openMod(\''+s.id+'\')">'+s.title+'</div>'
      +'<div class="rstory-intro" onclick="openMod(\''+s.id+'\')">'+s.intro+'</div>'

function doVote(sid, btn) {
  if(D.myVotes.indexOf(sid)>=0) return;
  if(D.myVotes.length>=3){toast('1日3票まで');return;}
  D.myVotes.push(sid);
  localStorage.setItem('hv', JSON.stringify(D.myVotes));
  D.votes[sid] = (D.votes[sid]||0)+1;
  btn.className='rvbtn voted'; btn.disabled=true; btn.innerHTML='▲ '+D.votes[sid];
  var tv = Object.values(D.votes).reduce(function(a,b){return a+b;},0);
  document.getElementById('r-vtot').textContent = tv.toLocaleString()+' 票';
  var vh = today+'_'+(navigator.userAgent||'').slice(0,20).replace(/\W/g,'');
  post('votes',[{story_id:sid,daily_id:D.daily.id,voter_hash:vh}]).catch(function(){});
}

}

function openMod(sid) {

  UI.modId = sid;
  var ap = D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='admin';});
  var gp = D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='guest';});
  var voted = D.myVotes.indexOf(s.id)>=0, v = D.votes[s.id]||0;
  document.getElementById('mod-meta').innerHTML = '<span>No.'+('0'+(s.order_index+1)).slice(-2)+'</span><span>'+s.genre+'</span><span>▲'+v+'</span>'+(ap?'<span style="color:#9a7a1e">★ 編集長</span>':'')+(gp?'<span style="color:#1e4a8a">◆ ゲスト</span>':'');

    var ia=p.picker_role==='admin', col=ia?'#9a7a1e':'#1e4a8a';

    if(UI.pf==='guest') return D.picks.some(function(p){return p.story_id===s.id&&p.picker_role==='guest';});

      +'<button class="pkbtn" style="border-color:#2563a8;color:'+(gp?'white':'#7ba8e0')+';background:'+(gp?'#2563a8':'transparent')+'" onclick="tPick(\''+s.id+'\',\'guest\')">◆</button>'

function tPick(sid, role){
  if(!D.sess) return;
  if(role==='admin' && D.sess.role!=='admin') return;
  // ゲストピックの場合は代理入力ユーザーIDを使う
  var pickerId = D.sess.id;
  if(role==='guest'){
    var sel = document.getElementById('guest-sel');
    if(sel && sel.value) pickerId = sel.value;
    else if(D.sess.role==='guest') pickerId = D.sess.id;
    else {toast('ゲストを選択してください');return;}
  }
  var ex = D.picks.filter(function(p){return p.story_id===sid&&p.picker_role===role;})[0];
  if(ex){
    del('picks','?id=eq.'+ex.id).then(function(){
      D.picks = D.picks.filter(function(p){return p.id!==ex.id;});
      rPL(); rDet(); rPE(); updStrip();
    }).catch(function(e){toast('エラー: '+e.message);});
  } else {
    if(D.picks.filter(function(p){return p.picker_role===role;}).length>=3){toast('ピックは3本まで');return;}
    post('picks',[{story_id:sid,daily_id:D.daily.id,picker_user_id:pickerId,picker_role:role,comment:''}]).then(function(r){
      D.picks.push(r[0]);
      rPL(); rDet(); rPE(); updStrip();
    }).catch(function(e){toast('エラー: '+e.message);});
  }
}

function updCmt(sid, role, comment){
  var p = D.picks.filter(function(x){return x.story_id===sid&&x.picker_role===role;})[0];
  if(!p) return;
  p.comment = comment;
  clearTimeout(p._t);
  p._t = setTimeout(function(){patch('picks','?id=eq.'+p.id,{comment:comment}).catch(function(){});}, 800);
}

// --- IMPORT ---
function doImport(){
  var json = document.getElementById('i-json').value;
  var date = document.getElementById('i-date').value;
  var theme = document.getElementById('i-theme').value;
  var err = document.getElementById('i-err');
  err.style.display = 'none';
  if(!json.trim()){err.textContent='JSONを貼り付けてください';err.style.display='block';return;}
  var parsed;
  try{parsed=JSON.parse(json.replace(/```json\n?|```/g,'').trim());}
  catch(e){err.textContent='JSON形式が正しくありません';err.style.display='block';return;}
  if(!Array.isArray(parsed)||parsed.length!==100){err.textContent='100本ちょうど必要です（現在'+(parsed?parsed.length:0)+'本）';err.style.display='block';return;}
  var bad = parsed.filter(function(x){return !x.title||!x.intro||!x.body||!x.genre;});
  if(bad.length){err.textContent='title/intro/body/genre が全て必要です';err.style.display='block';return;}
  var btn = document.getElementById('i-btn');
  btn.textContent='保存中...'; btn.disabled=true;
  upsert('daily_meta',[{date:date,theme:theme,status:'draft',editorial_comment:''}]).then(function(dm){
    D.daily = dm[0];
    return del('stories','?daily_id=eq.'+D.daily.id);
  }).then(function(){
    return del('picks','?daily_id=eq.'+D.daily.id);
  }).then(function(){
    D.picks = [];
    var ins = parsed.map(function(x,i){return{daily_id:D.daily.id,title:x.title,intro:x.intro,body:x.body,genre:x.genre,order_index:i};});
    var chain = Promise.resolve();
    for(var i=0;i<ins.length;i+=20){
      (function(chunk){chain=chain.then(function(){return post('stories',chunk);});})(ins.slice(i,i+20));
    }
    return chain;
  }).then(function(){
    return get('stories','?daily_id=eq.'+D.daily.id+'&order=order_index.asc');
  }).then(function(s){
    D.stories=s; D.votes={};
    document.getElementById('i-json').value='';
    toast(D.stories.length+'本をインポートしました');
    rPL(); rPE(); updStrip(); updIStat(); updPStat();
    showTab('picks');
  }).catch(function(e){
    err.textContent='エラー: '+e.message; err.style.display='block';
  }).then(function(){btn.textContent='▶ インポートする';btn.disabled=false;});
}

function updStrip(){
  var ac=D.picks.filter(function(p){return p.picker_role==='admin';}).length;
  var gc=D.picks.filter(function(p){return p.picker_role==='guest';}).length;

function updPStat(){
  if(!D.daily){var e=document.getElementById('p-stat');if(e)e.textContent='インポートが必要です';return;}
  var ac=D.picks.filter(function(p){return p.picker_role==='admin';}).length;
  var warns=[];
  if(D.stories.length!==100) warns.push('・短編が100本ありません（'+D.stories.length+'本）');
  if(ac<3) warns.push('・編集長ピックが3本ありません（'+ac+'本）');
  if(!D.daily.editorial_comment) warns.push('・総評がありません');
  var wl=document.getElementById('p-warn'), ps=document.getElementById('p-stat');
  if(warns.length){if(wl){wl.innerHTML=warns.join('<br>');wl.style.display='block';}if(ps)ps.textContent='上記を解決してください。';}
  else{if(wl)wl.style.display='none';if(ps)ps.innerHTML='<span style="color:#1a7a4a">✓ 公開できます</span>';}
  if(D.daily.status==='published'&&ps) ps.innerHTML='<span style="color:#b8952a">★ 現在公開中</span>';
}

function doPublish(){
  if(!D.daily) return;
  if(D.stories.length!==100){toast('100本必要です');return;}
  if(D.picks.filter(function(p){return p.picker_role==='admin';}).length<3){toast('編集長ピックが3本必要です');return;}
  if(!D.daily.editorial_comment){toast('総評を入力してください');return;}

  var ac=D.picks.filter(function(p){return p.picker_role==='admin';}).length;
  var gc=D.picks.filter(function(p){return p.picker_role==='guest';}).length;
  document.getElementById('conf-title').textContent = '公開確認';

    '日付：'+D.daily.date+'<br>'
    +'テーマ：'+D.daily.theme+'<br>'

function deactG(id){
  patch('users','?id=eq.'+id,{is_active:false}).then(function(){loadGuests();toast('無効化しました');}).catch(function(e){toast('エラー: '+e.message);});
}

function setupExpOpts(){
  var opts=[['date','日付'],['theme','テーマ'],['editors','選者'],['picked','選ばれた短編'],['comments','コメント'],['review','総評'],['unpicked','未選作品一覧']];
  var el=document.getElementById('exp-opts'); if(!el) return;
  el.innerHTML = opts.map(function(o){
    return '<label style="display:flex;align-items:center;gap:8px;font-family:\'Space Mono\',monospace;font-size:10px;color:'+(expO[o[0]]?'#f0ebe0':'rgba(240,235,224,.45)')+';cursor:pointer" onclick="togExp(\''+o[0]+'\',this)">'
      +'<input type="checkbox" '+(expO[o[0]]?'checked':'')+' style="accent-color:#b8952a"> '+o[1]+'</label>';
  }).join('');
}

function togExp(k,lbl){expO[k]=!expO[k];lbl.style.color=expO[k]?'#f0ebe0':'rgba(240,235,224,.45)';}

function setExpToday(){
  var ef=document.getElementById('exp-from'),et=document.getElementById('exp-to');
  if(ef)ef.value=today;if(et)et.value=today;
}

function buildMdForDay(dm, stories, picks, guests){
  var lines=[];
  var ap=picks.filter(function(p){return p.picker_role==='admin';});
  var gp=picks.filter(function(p){return p.picker_role==='guest';});
  if(expO.date) lines.push('# '+(dm.date||''),'');
  if(expO.theme&&dm.theme) lines.push('テーマ：'+dm.theme,'');
  if(expO.editors){
    lines.push('## 選者','','crambomb（EDITOR IN CHIEF）');
    guests.forEach(function(u){lines.push(u.display_name+'（GUEST EDITOR）');});
    lines.push('');
  }
  if(expO.picked){
    lines.push('## 編集長ピック','');
    ap.forEach(function(p){
      var s=stories.filter(function(x){return x.id===p.story_id;})[0];
      if(!s)return;
      lines.push('### '+s.title,'',s.body);
      if(expO.comments&&p.comment)lines.push('','> '+p.comment);
      lines.push('');
    });
    if(gp.length){
      lines.push('## ゲストピック','');
      gp.forEach(function(p){
        var s=stories.filter(function(x){return x.id===p.story_id;})[0];
        if(!s)return;
        var gname=(guests.filter(function(u){return u.id===p.picker_user_id;})[0]||{display_name:'ゲスト'}).display_name;
        lines.push('### '+s.title+' （'+gname+'）','',s.body);
        if(expO.comments&&p.comment)lines.push('','> '+p.comment);
        lines.push('');
      });
    }
  }
  if(expO.review&&dm.editorial_comment) lines.push('## 総評','',dm.editorial_comment,'');
  if(expO.unpicked){
    var pi=picks.map(function(p){return p.story_id;});
    lines.push('## 全作品一覧','');
    stories.filter(function(s){return pi.indexOf(s.id)<0;}).forEach(function(s){lines.push('### '+s.title,'',s.intro,'');});
  }
  lines.push('---','');
  return lines.join('\n');
}

function getExpRange(){
  var f=(document.getElementById('exp-from')||{value:today}).value||today;
  var t=(document.getElementById('exp-to')||{value:today}).value||today;
  if(f>t){var tmp=f;f=t;t=tmp;}
  return {from:f, to:t};
}

function doExport(){
  var range=getExpRange();
  var btn=document.querySelector('.bgold');
  if(btn){btn.textContent='取得中...';btn.disabled=true;}
  get('daily_meta','?date=gte.'+range.from+'&date=lte.'+range.to+'&order=date.asc').then(function(days){
    if(!days||!days.length){toast('期間内にデータがありません');if(btn){btn.textContent='▼ Markdownでエクスポート';btn.disabled=false;}return;}
    var chain=Promise.resolve([]);
    days.forEach(function(dm){
      chain=chain.then(function(results){
        return Promise.all([
          get('stories','?daily_id=eq.'+dm.id+'&order=order_index.asc'),
          get('picks','?daily_id=eq.'+dm.id),
          get('users','?role=eq.guest&is_active=eq.true')
        ]).then(function(r){results.push({dm:dm,stories:r[0],picks:r[1],guests:r[2]});return results;});
      });
    });
    return chain;
  }).then(function(results){
    if(!results) return;
    var text=results.map(function(r){return buildMdForDay(r.dm,r.stories,r.picks,r.guests);}).join('\n');
    var fname='hyakubon-'+range.from+(range.from!==range.to?'_'+range.to:'')+'.md';
    var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
    toast('エクスポートしました（'+results.length+'日分）');
  }).catch(function(e){toast('エラー: '+e.message);})
  .then(function(){if(btn){btn.textContent='▼ Markdownでエクスポート';btn.disabled=false;}});
}

function togPrev(){
  var el=document.getElementById('exp-prev');
  if(el.style.display==='none'||!el.style.display){
    el.style.display='block';
    var range=getExpRange();
    get('daily_meta','?date=gte.'+range.from+'&date=lte.'+range.to+'&order=date.asc').then(function(days){
      if(!days||!days.length){el.textContent='期間内にデータがありません';return;}
      var chain=Promise.resolve([]);
      days.forEach(function(dm){
        chain=chain.then(function(results){
          return Promise.all([
            get('stories','?daily_id=eq.'+dm.id+'&order=order_index.asc'),
            get('picks','?daily_id=eq.'+dm.id),
            get('users','?role=eq.guest&is_active=eq.true')
          ]).then(function(r){results.push({dm:dm,stories:r[0],picks:r[1],guests:r[2]});return results;});
        });
      });
      return chain;
    }).then(function(results){
      if(!results) return;
      el.textContent=results.map(function(r){return buildMdForDay(r.dm,r.stories,r.picks,r.guests);}).join('\n');
    });
  } else {
    el.style.display='none';
  }
}

// ===== カレンダー =====
function openCal(){
  CAL.adminMode = false;
  var d = D.daily ? new Date(D.daily.date) : new Date();
  CAL.year = d.getFullYear(); CAL.month = d.getMonth();
  // 公開済み日付一覧を取得
  get('daily_meta','?status=eq.published&select=date').then(function(ds){
    CAL.dates = (ds||[]).map(function(d){return d.date;});
    renderCal();
    document.getElementById('cal-modal').style.display='block';
  }).catch(function(){
    CAL.dates=[];renderCal();
    document.getElementById('cal-modal').style.display='block';
  });
}

function openAdminCal(){
  CAL.adminMode = true;
  var d = new Date(adminTargetDate);
  CAL.year = d.getFullYear(); CAL.month = d.getMonth();
  get('daily_meta','?select=date&order=date.desc').then(function(ds){
    CAL.dates = (ds||[]).map(function(d){return d.date;});
    renderCal();
    document.getElementById('cal-modal').style.display='block';
  }).catch(function(){
    CAL.dates=[];renderCal();
    document.getElementById('cal-modal').style.display='block';
  });
}

function closeCal(){document.getElementById('cal-modal').style.display='none';}

function calMove(dir){
  CAL.month += dir;
  if(CAL.month<0){CAL.month=11;CAL.year--;}
  if(CAL.month>11){CAL.month=0;CAL.year++;}
  renderCal();
}

function renderCal(){
  var mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = CAL.year+'年 '+mn[CAL.month];
  var grid = document.getElementById('cal-grid');
  var dows = ['日','月','火','水','木','金','土'];
  var html = dows.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  var first = new Date(CAL.year, CAL.month, 1).getDay();
  for(var i=0;i<first;i++) html+='<div class="cal-day"></div>';
  var days = new Date(CAL.year, CAL.month+1, 0).getDate();
  for(var d=1;d<=days;d++){
    var ds = CAL.year+'-'+('0'+(CAL.month+1)).slice(-2)+'-'+('0'+d).slice(-2);
    var cls = 'cal-day';
    if(CAL.dates.indexOf(ds)>=0) cls+=' has';
    if(ds===today) cls+=' today';
    if(ds===adminTargetDate && CAL.adminMode) cls+=' sel';
    if(CAL.dates.indexOf(ds)>=0){
      html+='<div class="'+cls+'" onclick="calSelect(\''+ds+'\')">'+d+'</div>';
    } else {
      html+='<div class="'+cls+'">'+d+'</div>';
    }
  }
  grid.innerHTML = html;
}

function calSelect(date){
  closeCal();
  if(CAL.adminMode){
    adminTargetDate = date;
    UI.selId = null;
    loadAdmin();
  } else {
    // 読者画面：その日のデータを読み込む
    get('daily_meta','?date=eq.'+date+'&status=eq.published').then(function(ds){
      if(!ds||!ds.length){toast('その日のデータはありません');return;}
      D.daily = ds[0];
      return Promise.all([
        get('stories','?daily_id=eq.'+D.daily.id+'&order=order_index.asc'),
        get('picks','?daily_id=eq.'+D.daily.id),
        get('votes','?daily_id=eq.'+D.daily.id+'&select=story_id'),
        get('users','?role=eq.guest&is_active=eq.true')
      ]).then(function(r){
        D.stories=r[0]; D.picks=r[1]; D.guests=r[3]; D.votes={};
        r[2].forEach(function(v){D.votes[v.story_id]=(D.votes[v.story_id]||0)+1;});
        UI.rf='all';
        document.querySelectorAll('.rfbtn').forEach(function(b){b.classList.remove('on');});
        document.querySelector('.rfbtn').classList.add('on');
        rReader();
      });
    }).catch(function(e){toast('エラー: '+e.message);});
  }
}
